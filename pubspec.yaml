name: rose_leaf_ai
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  http: ^1.6.0
  image_picker: ^1.2.1
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  flutter_screenutil: ^5.9.3

dev_dependencies:
